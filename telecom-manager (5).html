<style>
.customer-card {
    position: relative;
}

.whatsapp-button {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    font-size: 24px;
}
</style>

<script>
function sendWhatsApp(name, phone, package, monthlySubscription, totalDebt) {
    const message = `👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n📦 الباقة: ${package}\n💵 الاشتراك الشهري: ${monthlySubscription} \n💰 إجمالي الدين: ${totalDebt}`;
    const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
}
</script>

<div class="customer-card">
    <!-- Customer information here -->
    <a class="whatsapp-button" onclick="sendWhatsApp('اسم العميل', 'رقم العميل', 'الباقة', 'الاشتراك الشهري', 'إجمالي الدين')">📞</a>
</div>
